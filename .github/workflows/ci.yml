name: CI
on: { pull_request: {}, push: { branches: [main] } }

jobs:
  unit:                                  # 不連 DB：config / healthz / encoder mock / binary 等純單元
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # uv 預設 sync 會剪除 workspace 成員（root 不依賴成員）；故用 --inexact 累加輕量成員
      # （不含 torch），且一律以 `uv run --no-sync` 執行以避免重新 sync 又剪除。
      - run: uv sync --group dev
      - run: uv sync --package anatomy-backend --inexact
      - run: uv sync --package colpali-service --inexact
      - run: uv sync --package anatomy-eval --inexact
      - run: uv run --no-sync ruff check .
      - name: 確認 shared 模組 torch-free（D-L）
        run: |
          uv run --no-sync python -c "import anatomy_shared.binary, sys; assert 'torch' not in sys.modules; print('binary torch-free OK')"
          uv run --no-sync python -c "import anatomy_shared.colpali_runtime, sys; assert 'torch' not in sys.modules; print('colpali_runtime torch-free OK')"
      - name: 確認無 LlamaIndex 殘留（DL-015）
        run: "! grep -rIn --include='*.py' 'llama_index' backend ingest eval colpali_service shared || (echo 'LlamaIndex 殘留' && exit 1)"
      - name: 確認 binarize/pool/hamming 僅定義於 shared（§2.4 單一來源）
        run: "! grep -rInE --include='*.py' 'def (binarize|to_pg_bits|pool_patches|hamming_distance)\\(' backend ingest eval colpali_service || (echo '向量運算函式只能定義在 shared/binary.py' && exit 1)"
      - run: uv run --no-sync pytest backend/tests shared/tests colpali_service/tests eval/tests -q

  db-integration:                        # Phase 2 起有 DB/檢索測試；Phase 0 驗 migrate 框架可執行
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: { POSTGRES_USER: anatomy, POSTGRES_PASSWORD: anatomy_dev_pw, POSTGRES_DB: anatomy_rag }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U anatomy" --health-interval 5s --health-timeout 3s --health-retries 10
      pgbouncer:
        image: bitnamilegacy/pgbouncer:latest    # Bitnami 下架 docker.io/bitnami/* latest（2025H2）→ bitnamilegacy（drop-in）。TODO(verify): pin digest
        env:
          POSTGRESQL_HOST: postgres
          POSTGRESQL_USERNAME: anatomy
          POSTGRESQL_PASSWORD: anatomy_dev_pw
          POSTGRESQL_DATABASE: anatomy_rag
          PGBOUNCER_DATABASE: anatomy_rag        # 顯式暴露 anatomy_rag（bitnami 預設只暴露 postgres 別名）
          PGBOUNCER_PORT: 6432
          PGBOUNCER_POOL_MODE: transaction
          PGBOUNCER_AUTH_TYPE: scram-sha-256
        ports: ["6432:6432"]
        options: >-
          --health-cmd "PGPASSWORD=anatomy_dev_pw psql -h 127.0.0.1 -p 6432 -U anatomy -d anatomy_rag -tAc 'SELECT 1'"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: uv sync --package anatomy-backend --inexact
      - name: 安裝 psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: 驗證 PgBouncer 代理路徑（:6432 → postgres）
        run: |
          out=$(PGPASSWORD=anatomy_dev_pw psql -h localhost -p 6432 -U anatomy -d anatomy_rag -tAc 'SELECT current_database()')
          test "$out" = "anatomy_rag" || (echo "PgBouncer 代理失敗: got '$out'" && exit 1)
      - name: 建擴充（CI 無 init.sql 掛載）
        run: PGPASSWORD=anatomy_dev_pw psql -h localhost -U anatomy -d anatomy_rag -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pg_trgm;"
      - name: Alembic migrations（Phase 0 為框架驗證 no-op；Phase 2 起有內容）
        env: { PG_DIRECT_URL: postgresql://anatomy:anatomy_dev_pw@localhost:5432/anatomy_rag }
        run: cd backend && uv run --no-sync alembic -c alembic.ini upgrade head
      - name: DB 整合測試（Phase 2 起生效）
        env:
          DATABASE_URL: postgresql://anatomy:anatomy_dev_pw@localhost:6432/anatomy_rag
          PG_DIRECT_URL: postgresql://anatomy:anatomy_dev_pw@localhost:5432/anatomy_rag
          REDIS_URL: redis://localhost:6379/0
          REQUIRE_DB_TESTS: "1"                  # conftest guard 用；防止 env 漏傳導致整批 skip 假綠
        run: uv run --no-sync pytest backend/tests -q -m "db or integration"

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2

  # Phase 11 啟用：RAGAS gate（未達門檻阻擋 merge，§7.3）
