# Alembic 設定檔 — 以 cwd=backend/ 執行（uv run alembic -c alembic.ini <cmd>）

[alembic]
# script_location 相對於此 ini 的所在目錄（backend/）
script_location = src/anatomy_backend/db/migrations

# 版本檔名樣板（保留預設）
# file_template = %%(rev)s_%%(slug)s

# sys.path 前置路徑（留 . 即可，讓 alembic 能找到 src/ 下的 package）
prepend_sys_path = .

# path_separator: 跨平台路徑分隔符號
path_separator = os

# sqlalchemy.url 由 env.py 從環境變數 PG_DIRECT_URL 取得；此處留空（§0.3 例外）。
# 禁止在此處 hardcode 任何連線字串或密碼。
sqlalchemy.url =


[post_write_hooks]
# 新 revision 寫入後自動用 ruff 格式化
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME


# ---------------------------------------------------------------------------
# Logging configuration（標準 Alembic 日誌，供 env.py fileConfig() 使用）
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
