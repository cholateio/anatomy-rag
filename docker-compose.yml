services:
  postgres:
    image: pgvector/pgvector:pg16            # TODO(verify): pin digest；確認 pgvector ≥0.8
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: ["5432:5432"]                      # 僅供 migrations 直連
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgbouncer:                                  # env 驅動：自動產生設定 + userlist（不提交密碼），:6432
    image: bitnamilegacy/pgbouncer:latest     # Bitnami 已下架 docker.io/bitnami/* 免費 latest（2025H2）→ 改用 bitnamilegacy（凍結但 drop-in，env 介面不變）。TODO(verify): pin digest；production 評估 edoburu/pgbouncer
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT_NUMBER: 5432
      POSTGRESQL_USERNAME: ${POSTGRES_USER}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE: ${POSTGRES_DB}
      PGBOUNCER_PORT: 6432
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_DATABASE: ${POSTGRES_DB}
    ports: ["6432:6432"]
    healthcheck:
      # bitnami pgbouncer 映像無 pg_isready；改用內建 psql 經 :6432 跑 SELECT 1，
      # 同時驗證「pgbouncer 能代理到 postgres」的真實路徑。$$ 轉義 → 變數在容器 runtime
      # 用 bitnami 注入的 POSTGRESQL_* 展開（非 compose parse 時，故密碼不寫進 compose 設定）。
      test: ["CMD-SHELL", "PGPASSWORD=$$POSTGRESQL_PASSWORD psql -h 127.0.0.1 -p 6432 -U $$POSTGRESQL_USERNAME -d $$POSTGRESQL_DATABASE -tAc 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 10 }

  minio:
    image: minio/minio:latest                 # TODO(verify): pin
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes: ["miniodata:/data"]
    ports: ["9000:9000", "9001:9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:                                 # 冪等建立 bucket
    image: minio/mc:latest                    # TODO(verify): pin
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/${S3_BUCKET} &&
      echo 'bucket ready: ${S3_BUCKET}'"
    restart: "no"

  encoder:
    build: { context: ., dockerfile: colpali_service/Dockerfile.cpu }   # 核心用 CPU/mock
    environment: { ENCODER_MOCK: "true", COLPALI_DEVICE: cpu }
    ports: ["8001:8001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: { context: ., dockerfile: backend/Dockerfile }
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
      encoder: { condition: service_healthy }
    env_file: [.env]
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }   # 前端自足：context 為 ./frontend（非根；backend 才需根 context 取 workspace 成員）
    depends_on: { backend: { condition: service_healthy } }
    ports: ["3000:3000"]
    healthcheck:
      # localhost 在容器內先解析到 IPv6 ::1，但 Next.js standalone 綁 IPv4 0.0.0.0 →
      # busybox wget 連 ::1 被拒且不 fallback IPv4。改用 node 內建 http 打 127.0.0.1 並驗 200
      # （node 映像必有 node，免 wget/IPv6 陷阱）。
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes: { pgdata: {}, miniodata: {} }
